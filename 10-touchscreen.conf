# X11 Touchscreen Configuration for ADS7846
# Install to: /etc/X11/xorg.conf.d/10-touchscreen.conf
#
# This configures the evdev driver to handle touch input from the
# ADS7846 touchscreen controller used in most 3.5" SPI displays

Section "InputClass"
    Identifier "ADS7846 Touchscreen"
    MatchProduct "ADS7846"
    MatchDevicePath "/dev/input/event0"
    Driver "evdev"
EndSection
